syntax = "proto3";

package crdt;

option go_package = "colabcode/proto";

message Operation {
  string type = 1;   // "add" or "remove" or "heartbeat"
  string value = 2;
}

message Empty {}

service CRDTService {
  //client sends operation 
  rpc SendOperation (Operation) returns (Empty);

  //client subs to updates
  rpc Sync(Empty) returns (stream Operation);
}
